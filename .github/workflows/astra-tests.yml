name: Astra Generator — Unit Tests

# Runs on every push and every pull-request against any branch.
# No real Claude API key needed: all tests are pure static analysis (AST, regex,
# file-system checks, tsc). The Anthropic client is constructed but never called.
#
# Three test suites:
#   Suite 1: Template integrity (D1 regression) — templates.test.ts
#   Suite 2: Validator + generator unit tests   — validator/validator.test.ts
#   Suite 3: generate-and-typecheck (C1 gate)   — fixtures/typecheck-canonical.ts
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  # Prevent the postinstall hook from downloading Playwright browsers —
  # these tests don't launch a browser.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
  # Provide a dummy DATABASE_URL so modules that import db.ts don't throw
  # at module-load time. No actual DB operations are performed by the tests.
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy'

jobs:
  astra-unit-tests:
    name: Astra Generator Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Suite 1: Template integrity (D1 regression) ────────────────────────
      # Verifies the four static template constants in script-writer-agent.ts
      # have no premature JSDoc block-comment closes AND compile clean with tsc.
      - name: Run template tests
        run: npx tsx server/templates.test.ts

      # ── Suite 2: Validator gate + generator unit tests ─────────────────────
      # Covers all 13 validator gates plus helper functions:
      #   Gate 01–13 (static analysis gates)
      #   D2  getLocatorModuleId / getLocatorClassName
      #   D3  buildActionManifest
      #   D4  buildVerifyFunction signature
      #   D5  fixDoubleNavigation (leading-nav removal)
      #   D6  toNaturalLanguage (ARIA role + whitespace normalization)
      #   D7  buildTestFilePrompt tcId derivation + Gate 13 Excel sync
      #   C2  writeTempProjectDir + buildRetryPreamble pipeline
      - name: Run validator + generator unit tests
        run: npx tsx server/validator/validator.test.ts

      # ── Suite 2b: Locator-naming helper unit tests (D2 regression net) ────
      # 6 tests covering getLocatorModuleId / getLocatorClassName:
      #   Test 1 — round-trip consistency (failed on main before D2 fix)
      #   Test 2 — getLocatorClassName names
      #   Test 3 — empty input rejection
      #   Test 4 — whitespace input rejection
      #   Test 5 — lint guard: no literal .locators outside the helper
      #   Test 6 — canonical fixture import ↔ emitter path agree
      - name: Run locator-naming unit tests (D2 gate)
        run: npx tsx server/util/locator-naming.test.ts

      # ── Suite 3: generate-and-typecheck (C1 gate) ──────────────────────────
      # Assembles the canonical nousinfosystems.com project from committed static
      # templates + the pre-generated fixture snapshot, then runs tsc --noEmit.
      # No Claude API key needed — the AI-generated portions are stored in
      # server/fixtures/recordings/canonical-nousinfosystems.json.
      #
      # This gate catches TypeScript regressions introduced by generator changes.
      # To update the snapshot after a generator fix:
      #   1. Generate a fresh Nous project in NAT 2.0
      #   2. Copy the AI-generated files into canonical-nousinfosystems.json
      #   3. Commit — this step will go green
      - name: generate-and-typecheck
        run: npx tsx server/fixtures/typecheck-canonical.ts
        env:
          # Provide a dummy key so the Anthropic client (constructed at module load
          # time in script-writer-agent.ts) does not throw on import. No API calls
          # are made — the typecheck script uses only the exported static constants.
          ANTHROPIC_API_KEY: 'ci-dummy-key'
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy'
        continue-on-error: false

      - name: Upload canonical project on typecheck failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-typecheck-failure
          path: /tmp/nat20-canonical-*
          retention-days: 3
