name: Deploy NAT 2.0 ASTRA to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: nat20registry
  IMAGE_NAME: nat20registry.azurecr.io/nat20-astra
  AZURE_WEBAPP_NAME: nat20-astra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: nat20registry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deployment complete
        run: |
          echo "NAT 2.0 ASTRA deployed to https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
